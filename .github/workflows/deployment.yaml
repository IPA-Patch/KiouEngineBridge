name: deployment

# CD: when a v*.*.* tag is pushed, build both flavors and publish them
# as GitHub Release assets. The release name and tag are identical (no
# auto-prerelease, no draft); pre-releases ship via tags like v0.2.0-rc.1.

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to (re)build a release for (e.g. v0.1.0)"
        required: true
        type: string

permissions:
  contents: write  # required for softprops/action-gh-release

env:
  THEOS: ${{ github.workspace }}/theos
  IOS_SDK_VERSION: "16.5"

jobs:
  release:
    name: build + release
    runs-on: ubuntu-latest
    steps:
      - name: Resolve tag
        id: tag
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
              echo "value=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
              echo "value=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout source at tag
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.tag.outputs.value }}
          fetch-depth: 0
          # Sources/Common is a submodule (IPA-Patch/Shared); the build
          # references logging.m and binpatch.m from inside it.
          submodules: recursive

      - name: Verify control version matches tag
        # Catch the "bumped the tag but forgot to update control" class of
        # mistake before the build wastes several minutes producing a .deb
        # whose embedded version disagrees with the GitHub Release name.
        # control's Version field must equal the tag without the leading "v".
        run: |
          TAG="${{ steps.tag.outputs.value }}"
          VER="${TAG#v}"
          CTRL_VER=$(grep -E '^Version:' control | awk '{print $2}')
          echo "Tag version : ${VER}"
          echo "Control version: ${CTRL_VER}"
          if [ "${VER}" != "${CTRL_VER}" ]; then
              echo "::error::control Version (${CTRL_VER}) does not match tag (${VER})"
              exit 1
          fi

      - name: Install host build tools
        run: |
          # Mirrors integration.yaml: ldid is NOT in the noble apt repos
          # and is installed separately below. libtinfo6 / libncurses6 are
          # the runtime deps the Procursus ldid binary links against.
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
              build-essential curl git make perl xz-utils \
              libplist-utils libc++-dev \
              libtinfo6 libncurses6

      - name: Install ldid
        # apt has no ldid on Ubuntu noble (24.04), so pull the prebuilt
        # Linux x86_64 binary from the ProcursusTeam release. SHA256
        # pinned so a release-asset swap can't silently swap our signer.
        env:
          LDID_VERSION: "v2.1.5-procursus7"
          LDID_SHA256: "4b8862b2fefa2cd7fa8f88cb0310779619aeaa8c72d6aff22f019b470f2fa99a"
        run: |
          curl -L -o /tmp/ldid \
              "https://github.com/ProcursusTeam/ldid/releases/download/${LDID_VERSION}/ldid_linux_x86_64"
          echo "${LDID_SHA256}  /tmp/ldid" | sha256sum -c -
          sudo install -m 0755 /tmp/ldid /usr/local/bin/ldid
          ldid -V || ldid 2>&1 | head -1 || true

      - name: Cache Theos
        id: theos-cache
        uses: actions/cache@v5
        with:
          path: |
            theos
          # Bump on toolchain layout changes (see Install Theos comment).
          key: theos-linux-${{ env.IOS_SDK_VERSION }}-v3

      - name: Install Theos
        if: steps.theos-cache.outputs.cache-hit != 'true'
        run: |
          # Mirrors integration.yaml.
          # Theos itself.
          git clone --recursive https://github.com/theos/theos.git "$THEOS"

          # iOS cross-toolchain from L1ghtmann/llvm-project. The tarball
          # already lays out the linux/iphone/ directory under
          # $THEOS/toolchain, which is what Theos's makefiles expect --
          # no rename needed.
          ARCH=$(uname -m)
          curl -fsSL \
              "https://github.com/L1ghtmann/llvm-project/releases/latest/download/iOSToolchain-${ARCH}.tar.xz" \
            | tar xJ -C "$THEOS/toolchain"

          # iOS SDK matching IOS_SDK_VERSION.
          mkdir -p "$THEOS/sdks"
          curl -L -o /tmp/sdk.tar.gz \
              "https://github.com/theos/sdks/archive/master.tar.gz"
          tar -xf /tmp/sdk.tar.gz -C /tmp
          cp -R "/tmp/sdks-master/iPhoneOS${IOS_SDK_VERSION}.sdk" \
                "$THEOS/sdks/"

      - name: Verify Theos
        run: |
          ls "$THEOS"
          ls "$THEOS/sdks"
          test -d "$THEOS/sdks/iPhoneOS${IOS_SDK_VERSION}.sdk"

      - name: Build rootless .deb (MobileSubstrate)
        run: |
          make clean
          make package
          ls -la packages/

      - name: Build jailed .dylib (Dobby static)
        run: |
          make jailed
          ls -la packages/jailed/

      - name: Sanity check jailed dylib (no external hook engine)
        run: |
          DYLIB=packages/jailed/KiouEngineBridge.dylib
          test -f "$DYLIB"
          if command -v otool >/dev/null 2>&1; then
              otool -L "$DYLIB"
              if otool -L "$DYLIB" | grep -E "libsubstrate|libdobby"; then
                  echo "::error::Jailed dylib leaks an external hook-engine dependency"
                  exit 1
              fi
          else
              strings "$DYLIB" | grep -E "libsubstrate|libdobby\.dylib" \
                  && { echo "::error::Jailed dylib leaks an external hook-engine dependency"; exit 1; } \
                  || echo "no external hook-engine references found"
          fi

      - name: Stage release assets
        id: assets
        run: |
          mkdir -p dist
          # Versioned .deb file name copied verbatim out of packages/.
          cp packages/*.deb dist/
          # Rename the jailed dylib to include the tag so Releases makes
          # it obvious which build a user is grabbing.
          TAG="${{ steps.tag.outputs.value }}"
          VER="${TAG#v}"
          cp packages/jailed/KiouEngineBridge.dylib \
             "dist/KiouEngineBridge-${VER}-jailed.dylib"
          ls -la dist/

      - name: Compute SHA256 checksums
        run: |
          cd dist
          sha256sum * > SHA256SUMS
          cat SHA256SUMS

      - name: Publish release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.tag.outputs.value }}
          name: ${{ steps.tag.outputs.value }}
          generate_release_notes: true
          files: |
            dist/*.deb
            dist/*.dylib
            dist/SHA256SUMS
          fail_on_unmatched_files: true
